[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "android-power-profiler"
version = "0.3.0"
description = "Standalone long-session Android battery and resource profiler"
readme = "README.md"
requires-python = ">=3.10"
dependencies = []

[project.scripts]
android-power-profiler = "android_power_profiler.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
